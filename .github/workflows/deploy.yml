name: Deploy Quartz site to GitHub Pages

on:
  push:
    branches:
      - v4

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for git info
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Dependencies
        run: npm ci
      - name: Build Quartz
        run: npx quartz build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

        # ... (your existing on:, concurrency:, jobs: build:, deploy: sections) ...

  # Add this new job
  indexnow-submit:
    needs: deploy # Run only after the deploy job is successful
    if: success() # Only run if the deploy job succeeded
    runs-on: ubuntu-latest
    name: Submit URLs to IndexNow

    env:
      # Define your site host and key location
      HOST: "masri.blog"
      KEY_LOCATION: "https://masri.blog/7e3e0fbe3ca044a89a6a3d6c100bb091.txt"
      # Add IndexNow API Key from Secrets
      INDEXNOW_API_KEY: ${{ secrets.INDEXNOW_KEY }}
      # List of IndexNow endpoints to ping
      ENDPOINTS: >-
        https://www.bing.com/indexnow
        https://yandex.com/indexnow
        https://search.seznam.cz/indexnow

    steps:
      - name: Install curl and XML tools
        run: sudo apt-get update && sudo apt-get install -y curl libxml2-utils

      - name: Fetch Live Sitemap
        run: curl -sL "https://${HOST}/sitemap.xml" -o sitemap.xml

      - name: Check if sitemap was fetched
        run: |
          if [ ! -s sitemap.xml ]; then
            echo "Error: Failed to fetch sitemap.xml or it is empty."
            exit 1
          fi
          echo "Sitemap fetched successfully."

      - name: Extract URLs and Format JSON
        id: format_urls
        run: |
          echo "Extracting URLs from sitemap.xml..."
          # Use xmllint to extract URLs, handles XML structure correctly
          URLS=$(xmllint --xpath "//url/loc/text()" sitemap.xml)

          if [ -z "$URLS" ]; then
            echo "Error: No URLs found in sitemap.xml."
            exit 1
          fi

          echo "Formatting URLs for JSON payload..."
          URL_LIST_JSON=""
          for url in $URLS; do
            # Ensure each URL is enclosed in double quotes and separated by a comma
            URL_LIST_JSON+="\"$url\","
          done
          # Remove the trailing comma
          URL_LIST_JSON=${URL_LIST_JSON%,}

          echo "Formatted URL list (first 100 chars): ${URL_LIST_JSON:0:100}..."
          # Set the output for use in the next step
          echo "json_list=[${URL_LIST_JSON}]" >> $GITHUB_OUTPUT

      - name: Submit URLs to IndexNow Endpoints
        run: |
          JSON_PAYLOAD=$(cat <<EOF
          {
            "host": "${HOST}",
            "key": "${INDEXNOW_API_KEY}",
            "keyLocation": "${KEY_LOCATION}",
            "urlList": ${{ steps.format_urls.outputs.json_list }}
          }
          EOF
          )

          echo "Submitting to IndexNow endpoints..."
          # Use xargs to run curl for each endpoint listed in the ENDPOINTS env var
          echo "${ENDPOINTS}" | xargs -n 1 -I {} sh -c \
          'echo "Submitting to endpoint: {}"; \
           curl --fail-with-body -X POST "{}" \
             -H "Content-Type: application/json; charset=utf-8" \
             -d "$1"' _ "$JSON_PAYLOAD" # Pass JSON_PAYLOAD as an argument to sh -c

          echo "IndexNow submission attempts completed."
